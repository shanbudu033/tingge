<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>季初言的私藏电台</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js"></script>

<style>
:root {
    --color-01: #142844;
    --color-02: #3966A2;
    --color-03: #6192D3;
    --color-04: #D5DFEB;
    --color-05: #F8F6F7;
}

body {
    background: linear-gradient(135deg, var(--color-01), var(--color-02));
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

.container {
    width: 90%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
}

.unlock {
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="unlock" id="unlockBtn">▶ 点我启动音乐</div>

<meting-js
    id="player"
    server="netease"
    type="playlist"
    id="17898543713"
    order="random"
    theme="#6192D3"
    autoplay="false"
    list-folded="true">
</meting-js>

</div>
<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

let ap = null;
let ready = false;

// 🔥 强制轮询拿播放器（比 aplayer-ready 更稳）
const timer = setInterval(() => {
    const meting = document.querySelector('#player');
    if (meting && meting.aplayer) {
        ap = meting.aplayer;
        ready = true;
        clearInterval(timer);
        console.log("播放器已捕获", ap);

        bindEvents();
    }
}, 300);


// ✅ 绑定事件
function bindEvents() {
    ap.on('lrcshow', (lrc) => {
        tg?.sendData(JSON.stringify({
            type: "lyric_sync",
            content: lrc.text
        }));
    });

    ap.on('listswitch', () => {
        const song = ap.list.audios[ap.list.index];
        tg?.sendData(JSON.stringify({
            type: "song_change",
            content: song.title
        }));
    });

    ap.on('error', () => {
        console.log("网易云挂了，切备用音源");
        forcePlayTestAudio();
    });
}


// ✅ 点击按钮（重点修复）
document.getElementById('unlockBtn').addEventListener('click', async () => {
    if (!ready) {
        alert("播放器还没加载好");
        return;
    }

    try {
        // 🔥 关键：先静音播放再解锁
        ap.audio.muted = true;

        await ap.play();

        ap.audio.muted = false;

        console.log("播放成功");
        document.getElementById('unlockBtn').innerText = "🎵 正在播放";

    } catch (e) {
        console.log("播放失败，尝试强制音频", e);
        forcePlayTestAudio();
    }
});


// ✅ 强制播放一个绝对能播的音频（排除环境问题）
function forcePlayTestAudio() {
    if (!ap) return;

    ap.list.clear();

    ap.list.add([{
        name: "测试音频",
        artist: "debug",
        url: "https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3",
        cover: ""
    }]);

    ap.play();
}
</script>

</body>
</html>
