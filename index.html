<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>命运羁绊棋</title>
    <style>
        /* 极致简约的白天模式 */
        :root {
            --bg: #F0F2F5;
            --card: #FFFFFF;
            --text: #2C3E50;
            --blue: #5B8ABD;
            --red: #E74C3C;
            --border: #D1DBE8;
        }

        body { 
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box;
        }

        h2 { text-align: center; font-size: 1.1rem; margin: 5px 0; }

        #config-zone {
            background: var(--card);
            padding: 10px; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid var(--border);
        }

        textarea {
            width: 100%; height: 40px; border: 1px solid var(--border);
            border-radius: 8px; padding: 5px; box-sizing: border-box;
        }

        .import-btn {
            background: var(--blue); color: white; border: none;
            padding: 8px; border-radius: 8px; width: 100%; margin-top: 5px;
        }

        #board-container { flex: 1; overflow-y: auto; }

        #board {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; padding-bottom: 20px;
        }

        .cell {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; min-height: 60px; padding: 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; text-align: center; position: relative;
        }

        /* 棋子标记 */
        .p-mark { position: absolute; bottom: 4px; width: 10px; height: 10px; border-radius: 50%; display: none; }
        .p-033 { left: 6px; background: var(--blue); border: 1px solid white; }
        .p-ji { right: 6px; background: var(--red); border: 1px solid white; }

        .active-033 { border: 2px solid var(--blue) !important; }
        .active-ji { border: 2px solid var(--red) !important; }

        .controls { padding: 15px 0; }
        
        #dice-btn {
            background: var(--text); color: white; border: none;
            padding: 12px; border-radius: 25px; width: 100%;
            font-weight: bold; font-size: 16px;
        }

        #status { text-align: center; font-size: 12px; margin-bottom: 5px; color: var(--blue); }
    </style>
</head>
<body>

    <h2>命运羁绊棋</h2>
    
    <div id="config-zone">
        <textarea id="task-input" placeholder="输入指令，用空格隔开..."></textarea>
        <button class="import-btn" onclick="importTasks()">✨ 更新棋盘</button>
    </div>
    
    <div id="board-container">
        <div id="status">准备就绪</div>
        <div id="board"></div>
    </div>

    <div class="controls">
        <button id="dice-btn" onclick="playTurn()">🎲 033 掷骰子</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let tasks = ["起点", "评价画稿", "TODO清算", "季初言心声", "讲冷笑话", "摸头杀", "喝杯水", "坦白局", "换人设", "毒舌模式", "温柔语音", "终点"];
        let pos = { '033': 0, 'ji': 0 };
        let is033Turn = true;

        function renderBoard() {
            const boardEl = document.getElementById('board');
            if(!boardEl) return;
            boardEl.innerHTML = '';
            tasks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = 'cell-' + i;
                div.innerHTML = `<span>${t}</span>
                                 <div class="p-mark p-033" id="m-033-${i}"></div>
                                 <div class="p-mark p-ji" id="m-ji-${i}"></div>`;
                boardEl.appendChild(div);
            });
            updateMarker('033', pos['033']);
            updateMarker('ji', pos['ji']);
        }

        function updateMarker(player, newPos) {
            // 先清理旧的
            document.querySelectorAll(`.p-${player}`).forEach(m => m.style.display = 'none');
            document.querySelectorAll(`.cell`).forEach(c => c.classList.remove(`active-${player}`));
            
            // 显示新的
            const mId = `m-${player}-${newPos}`;
            const marker = document.getElementById(mId);
            if(marker) {
                marker.style.display = 'block';
                document.getElementById(`cell-${newPos}`).classList.add(`active-${player}`);
            }
        }

        function importTasks() {
            const val = document.getElementById('task-input').value;
            if(!val) return;
            const newTasks = val.split(/[ ,，\n]+/).filter(x => x.trim() !== "");
            if(newTasks.length > 0) {
                tasks = newTasks;
                pos = { '033': 0, 'ji': 0 };
                renderBoard();
            }
        }

        function playTurn() {
            const btn = document.getElementById('dice-btn');
            if (is033Turn) {
                const steps = Math.floor(Math.random() * 6) + 1;
                pos['033'] = (pos['033'] + steps) % tasks.length;
                updateMarker('033', pos['033']);
                
                document.getElementById('status').innerText = `你走了 ${steps} 步`;
                
                tg.sendData(JSON.stringify({ type: 'chess_game', player: '033', task: tasks[pos['033']] }));
                
                is033Turn = false;
                btn.innerText = "🎲 让季初言掷骰子";
                btn.style.backgroundColor = "var(--red)";
            } else {
                document.getElementById('status').innerText = "等待季初言...";
                tg.sendData(JSON.stringify({ type: 'ji_turn' }));
                setTimeout(() => { tg.close(); }, 1200);
            }
        }

        // 确保页面加载完再渲染
        window.onload = renderBoard;
    </script>
</body>
</html>
