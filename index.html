<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>033 x 季初言：命运羁绊棋</title>
    <style>
        :root { --main-blue: #00d2ff; --main-red: #ff4444; }
        body { background: #121212; color: #eee; font-family: 'PingFang SC', sans-serif; margin: 0; padding: 15px; }
        h2 { color: var(--main-blue); margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        
        /* 指令导入区 */
        #config-zone { background: #1e1e1e; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        textarea { width: 90%; height: 60px; background: #222; color: #ccc; border: 1px solid #444; border-radius: 5px; padding: 5px; font-size: 12px; }
        .import-btn { background: #444; color: #fff; border: none; padding: 5px 15px; border-radius: 5px; margin-top: 5px; cursor: pointer; }

        /* 棋盘布局 */
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .cell { background: #262626; border: 1px solid #3a3a3a; height: 85px; border-radius: 8px; 
                display: flex; align-items: center; justify-content: center; font-size: 11px; 
                padding: 5px; position: relative; transition: all 0.3s; overflow: hidden; }
        
        /* 玩家头像标记 */
        .p-mark { width: 18px; height: 18px; border-radius: 50%; position: absolute; bottom: 5px; display: none; border: 2px solid #fff; }
        .p-033 { background: var(--main-blue); left: 5px; box-shadow: 0 0 8px var(--main-blue); }
        .p-ji { background: var(--main-red); right: 5px; box-shadow: 0 0 8px var(--main-red); }
        
        /* 激活状态 */
        .active-033 { border-color: var(--main-blue); background: #002233; }
        .active-ji { border-color: var(--main-red); background: #331111; }

        /* 操作区 */
        .controls { position: fixed; bottom: 20px; left: 0; width: 100%; text-align: center; }
        #dice-btn { background: var(--main-blue); color: #000; border: none; padding: 12px 40px; 
                    border-radius: 30px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #status { font-size: 13px; color: #888; margin-bottom: 80px; }
    </style>
</head>
<body>

    <h2>命运羁绊棋</h2>
    <p style="font-size: 12px; color: #666; margin-top: 0;">Player: 033 vs 季初言</p>

    <div id="config-zone">
        <textarea id="task-input" placeholder="输入12个指令，用中文逗号或空格隔开..."></textarea><br>
        <button class="import-btn" onclick="importTasks()">✨ 一键导入新指令</button>
    </div>
    
    <div class="board" id="board"></div>

    <div id="status">准备就绪，请 033 开始掷骰子</div>

    <div class="controls">
        <button id="dice-btn" onclick="playTurn()">🎲 033 掷骰子</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 默认指令
        let tasks = ["起点", "夸夸033", "清算TODO", "季初言心声", "发自拍画稿", "讲冷笑话", "摸头杀", "喝杯水", "坦白局", "换人设", "毒舌模式", "终点"];
        let pos = { '033': 0, 'ji': 0 };
        let is033Turn = true;

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            tasks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = 'cell-' + i;
                div.innerHTML = `<span>${t}</span>
                                 <div class="p-mark p-033" id="m-033-${i}"></div>
                                 <div class="p-mark p-ji" id="m-ji-${i}"></div>`;
                boardEl.appendChild(div);
            });
            updateMarker('033', 0);
            updateMarker('ji', 0);
        }

        function importTasks() {
            const input = document.getElementById('task-input').value;
            if(!input) return alert("写点什么再导入呀~");
            // 支持中文逗号、英文逗号、空格分割
            const newTasks = input.split(/[，, \n]+/).filter(t => t.trim() !== "");
            if(newTasks.length < 12) {
                alert("指令最好凑齐12个，不然棋盘太空了！");
            }
            tasks = newTasks.slice(0, 12); // 只取前12个
            renderBoard();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateMarker(player, newPos) {
            // 清除该玩家所有旧标记
            document.querySelectorAll(`.p-${player}`).forEach(m => m.style.display = 'none');
            document.querySelectorAll(`.cell`).forEach(c => c.classList.remove(`active-${player}`));
            
            // 显示新标记
            const marker = document.getElementById(`m-${player}-${newPos}`);
            if(marker) marker.style.display = 'block';
            document.getElementById(`cell-${newPos}`).classList.add(`active-${player}`);
        }

        function playTurn() {
            const player = is033Turn ? '033' : 'ji';
            const steps = Math.floor(Math.random() * 6) + 1;
            
            // 计算新位置
            pos[player] = (pos[player] + steps) % tasks.length;
            updateMarker(player, pos[player]);

            const task = tasks[pos[player]];
            document.getElementById('status').innerText = `${player === '033' ? '你' : '季初言'} 投出了 ${steps} 点，落在：${task}`;

            // 发送数据给 Python 后台
            tg.sendData(JSON.stringify({
                type: 'chess_game',
                player: player === '033' ? '033' : '季初言',
                task: task
            }));

            // 振动反馈
            tg.HapticFeedback.impactOccurred('medium');

            // 切换回合
            is033Turn = !is033Turn;
            const btn = document.getElementById('dice-btn');
            btn.innerText = is033Turn ? "🎲 033 掷骰子" : "🎲 让季初言掷骰子";
            btn.style.background = is033Turn ? "var(--main-blue)" : "var(--main-red)";
        }

        // 初始化
        renderBoard();
    </script>
</body>
</html>
