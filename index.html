<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>033 x 季初言：命运羁绊棋</title>

    <style>  
        /* 033 专属：午后书房配色 */
        :root {
            --bg-light: #F7F9FC;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-soft: #D1DBE8;
            --main-blue: #5B8ABD;
            --text-main: #2C3E50;
            --ji-red: #E74C3C;
        }

        body { 
            background: var(--bg-light); 
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-main); 
            font-family: 'PingFang SC', system-ui, sans-serif; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; /* 防止页面整体抖动 */
        }

        h2 { color: var(--text-main); margin: 0 0 10px 0; font-weight: 600; text-align: center; font-size: 1.2rem; }

        #config-zone { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 12px; border-radius: 16px; 
            margin-bottom: 15px; border: 1px solid var(--border-soft); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        textarea { 
            width: 100%; height: 40px; background: rgba(255, 255, 255, 0.5); 
            color: var(--text-main); border: 1px solid var(--border-soft); 
            border-radius: 10px; padding: 8px; font-size: 13px; outline: none;
            box-sizing: border-box; resize: none;
        }

        .import-btn { 
            background: var(--main-blue); color: white; 
            border: none; padding: 6px 18px; border-radius: 8px; 
            margin-top: 8px; font-weight: bold; font-size: 12px; width: 100%;
        }

        /* 棋盘布局控制 */
        #board-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        #board {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 每行3个格子 */
            gap: 10px;
        }

        .cell { 
            background: var(--card-bg); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-soft); 
            min-height: 70px; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; padding: 10px; position: relative; 
            transition: all 0.3s ease; text-align: center;
        }

        /* 棋子标记样式 */
        .p-mark {
            position: absolute; bottom: 5px; width: 12px; height: 12px; border-radius: 50%;
        }
        .p-033 { left: 10px; background: var(--main-blue); border: 2px solid white; box-shadow: 0 0 5px rgba(91,138,189,0.5); }
        .p-ji { right: 10px; background: var(--ji-red); border: 2px solid white; box-shadow: 0 0 5px rgba(231,76,60,0.5); }

        .active-033 { border: 2px solid var(--main-blue) !important; background: white; transform: translateY(-2px); }
        .active-ji { border: 2px solid var(--ji-red) !important; background: white; transform: translateY(-2px); }

        #status { text-align: center; margin-top: 10px; font-size: 13px; color: var(--main-blue); font-weight: bold; }

        .controls {
            position: fixed; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; padding: 0 20px;
        }

        #dice-btn { 
            background: var(--text-main); color: white; 
            border: none; padding: 12px 40px; border-radius: 40px; 
            font-weight: bold; font-size: 16px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%;
        }
    </style> </head>
<body>

    <h2>命运羁绊棋</h2>
    
    <div id="config-zone">
        <textarea id="task-input" placeholder="输入指令，空格或逗号隔开..."></textarea>
        <button class="import-btn" onclick="importTasks()">✨ 重新部署棋盘</button>
    </div>
    
    <div id="board-container">
        <div id="board"></div>
        <div id="status">准备就绪</div>
    </div>

    <div class="controls">
        <button id="dice-btn" onclick="playTurn()">🎲 033 掷骰子</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let tasks = ["起点", "评价画稿", "TODO清算", "季初言心声", "讲冷笑话", "摸头杀", "喝杯水", "坦白局", "换人设", "毒舌模式", "温柔语音", "终点"];
        let pos = { '033': 0, 'ji': 0 };
        let is033Turn = true;

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            tasks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = 'cell-' + i;
                div.innerHTML = `<span>${t}</span>
                                 <div class="p-mark p-033" id="m-033-${i}" style="display:none"></div>
                                 <div class="p-mark p-ji" id="m-ji-${i}" style="display:none"></div>`;
                boardEl.appendChild(div);
            });
            updateMarker('033', pos['033']);
            updateMarker('ji', pos['ji']);
        }

        function importTasks() {
            const input = document.getElementById('task-input').value;
            if(!input) return;
            const newTasks = input.split(/[，, \n\t]+/).filter(t => t.trim() !== "");
            if(newTasks.length > 0) {
                tasks = newTasks;
                pos = { '033': 0, 'ji': 0 };
                renderBoard();
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function updateMarker(player, newPos) {
            document.querySelectorAll(`.p-${player}`).forEach(m => m.style.display = 'none');
            document.querySelectorAll(`.cell`).forEach(c => c.classList.remove(`active-${player}`));
            
            const marker = document.getElementById(`m-${player}-${newPos}`);
            if(marker) {
                marker.style.display = 'block';
                document.getElementById(`cell-${newPos}`).classList.add(`active-${player}`);
                document.getElementById(`cell-${newPos}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function playTurn() {
            const btn = document.getElementById('dice-btn');
            if (is033Turn) {
                const steps = Math.floor(Math.random() * 6) + 1;
                pos['033'] = (pos['033'] + steps) % tasks.length;
                updateMarker('033', pos['033']);
                const task = tasks[pos['033']];
                document.getElementById('status').innerText = `你走了 ${steps} 步 ➔ ${task}`;
                tg.sendData(JSON.stringify({ type: 'chess_game', player: '033', task: task }));
                tg.HapticFeedback.impactOccurred('light');
                is033Turn = false;
                btn.innerText = "🎲 让季初言掷骰子";
                btn.style.background = "var(--ji-red)";
            } else {
                document.getElementById('status').innerText = "等待季初言掷骰子...";
                tg.sendData(JSON.stringify({ type: 'ji_turn' }));
                tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => { tg.close(); }, 1500); 
            }
        }

        renderBoard();
    </script>
</body>
</html>
