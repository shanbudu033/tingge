<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>033 x 季初言：命运羁绊棋</title>
    <style>
        /* 033 专属配色方案 */
        :root {
            --bg-dark: #142844;    /* Color 01: 深邃底色 */
            --border-blue: #3966A2;/* Color 02: 边框/次要色 */
            --main-blue: #6192D3;  /* Color 03: 主色调/棋子 */
            --text-light: #D5DFEB; /* Color 04: 文字/淡色 */
            --accent-white: #F8F6F7;/* Color 05: 高亮/按钮 */
            --ji-red: #ff5e5e;     /* 季初言的标识红（稍微调亮配合冷色） */
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-light); 
            font-family: 'PingFang SC', -apple-system, sans-serif; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; height: 100vh;
        }

        h2 { color: var(--accent-white); margin: 0 0 10px 0; font-weight: 300; letter-spacing: 2px; }
        
        /* 配置区 */
        #config-zone { 
            background: rgba(57, 102, 162, 0.2); 
            padding: 12px; border-radius: 12px; 
            margin-bottom: 15px; border: 1px solid var(--border-blue); 
        }
        textarea { 
            width: 94%; height: 50px; background: rgba(20, 40, 68, 0.6); 
            color: var(--accent-white); border: 1px solid var(--border-blue); 
            border-radius: 6px; padding: 8px; font-size: 12px; outline: none;
        }
        .import-btn { 
            background: var(--main-blue); color: var(--bg-dark); 
            border: none; padding: 6px 18px; border-radius: 4px; 
            margin-top: 8px; font-weight: bold; font-size: 12px;
        }

        /* 自动伸缩棋盘 */
        #board-container { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .board { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 保持每行4个，数量多就往下排 */
            gap: 6px; 
        }
        .cell { 
            background: rgba(97, 146, 211, 0.1); 
            border: 1px solid var(--border-blue); 
            min-height: 70px; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; padding: 4px; position: relative; 
            transition: all 0.3s; line-height: 1.2;
        }
        
        /* 标记显示 */
        .p-mark { width: 14px; height: 14px; border-radius: 50%; position: absolute; bottom: 4px; border: 1.5px solid var(--accent-white); z-index: 10; }
        .p-033 { background: var(--main-blue); left: 4px; box-shadow: 0 0 5px var(--main-blue); }
        .p-ji { background: var(--ji-red); right: 4px; box-shadow: 0 0 5px var(--ji-red); }
        
        /* 激活格样式 */
        .active-033 { border: 1.5px solid var(--accent-white) !important; background: rgba(97, 146, 211, 0.3); }
        .active-ji { border: 1.5px solid var(--ji-red) !important; background: rgba(255, 94, 94, 0.2); }

        /* 操作悬浮区 */
        .controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: linear-gradient(transparent, var(--bg-dark) 40%);
            padding: 20px 0; text-align: center; 
        }
        #dice-btn { 
            background: var(--accent-white); color: var(--bg-dark); 
            border: none; padding: 12px 45px; border-radius: 30px; 
            font-weight: bold; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #status { font-size: 12px; color: var(--main-blue); margin-bottom: 10px; padding: 0 20px; }
    </style>
</head>
<body>

    <h2>命运羁绊棋</h2>
    
    <div id="config-zone">
        <textarea id="task-input" placeholder="输入任意数量指令，用空格或逗号隔开..."></textarea>
        <button class="import-btn" onclick="importTasks()">✨ 导入指令</button>
    </div>
    
    <div id="board-container">
        <div class="board" id="board"></div>
        <div id="status">准备就绪</div>
    </div>

    <div class="controls">
        <button id="dice-btn" onclick="playTurn()">🎲 033 掷骰子</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 默认指令 (可以无限长)
        let tasks = ["起点", "评价画稿", "清算TODO", "季初言心声", "讲冷笑话", "摸头杀", "喝杯水", "坦白局", "换人设", "毒舌模式", "温柔语音", "终点"];
        let pos = { '033': 0, 'ji': 0 };
        let is033Turn = true;

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            tasks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = 'cell-' + i;
                div.innerHTML = `<span>${t}</span>
                                 <div class="p-mark p-033" id="m-033-${i}" style="display:none"></div>
                                 <div class="p-mark p-ji" id="m-ji-${i}" style="display:none"></div>`;
                boardEl.appendChild(div);
            });
            updateMarker('033', pos['033']);
            updateMarker('ji', pos['ji']);
        }

        function importTasks() {
            const input = document.getElementById('task-input').value;
            if(!input) return;
            // 改进分词逻辑
            const newTasks = input.split(/[，, \n\t]+/).filter(t => t.trim() !== "");
            if(newTasks.length > 0) {
                tasks = newTasks;
                pos = { '033': 0, 'ji': 0 }; // 重新开始
                renderBoard();
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function updateMarker(player, newPos) {
            // 隐藏该玩家所有标记
            document.querySelectorAll(`.p-${player}`).forEach(m => m.style.display = 'none');
            document.querySelectorAll(`.cell`).forEach(c => c.classList.remove(`active-${player}`));
            
            // 显示当前位置标记
            const marker = document.getElementById(`m-${player}-${newPos}`);
            if(marker) {
                marker.style.display = 'block';
                document.getElementById(`cell-${newPos}`).classList.add(`active-${player}`);
                // 自动滚动到当前格子
                document.getElementById(`cell-${newPos}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function playTurn() {
            const playerKey = is033Turn ? '033' : 'ji';
            const playerName = is033Turn ? '033' : '季初言';
            const steps = Math.floor(Math.random() * 6) + 1;
            
            pos[playerKey] = (pos[playerKey] + steps) % tasks.length;
            updateMarker(playerKey, pos[playerKey]);

            const task = tasks[pos[playerKey]];
            document.getElementById('status').innerText = `${playerName} 走了 ${steps} 步 ➔ ${task}`;

            tg.sendData(JSON.stringify({
                type: 'chess_game',
                player: playerName,
                task: task
            }));

            tg.HapticFeedback.impactOccurred('light');

            is033Turn = !is033Turn;
            const btn = document.getElementById('dice-btn');
            btn.innerText = is033Turn ? "🎲 033 掷骰子" : "🎲 让季初言掷骰子";
            btn.style.background = is033Turn ? "var(--accent-white)" : "var(--ji-red)";
            btn.style.color = is033Turn ? "var(--bg-dark)" : "white";
        }

        renderBoard();
    </script>
</body>
</html>
